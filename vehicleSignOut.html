<!doctype html>
<html>
  <head>
    <title>ParkEase Dashboard</title>
    <link rel="stylesheet" href="style2.css" />
  </head>

  <body class="signOut-page">
    <div class="nav-set">
      <nav class="navbar">
        <div class="logo">ParkEase</div>

        <ul class="nav-links">
          <li><a href="register.html">Register Car</a></li>

          <li><a href="reports.html">Admin</a></li>
          <li><a href="batterySection.html">Battery Section</a></li>
          <li><a href="tyreClinic.html">Tyre Clinic</a></li>
          <li><a href="signout.html" class="signOut-link">Check Out</a></li>
        </ul>

        <div class="nav-right">
          <span class="user-role">Admin</span>
          <a href="index.html" class="logout-btn">Logout</a>
        </div>
      </nav>

      <div class="dashboard">
        <div class="form-section">
          <h2>Vehicle Sign Out</h2>

          <form id="signOutForm">
            <label>Receiver Name</label>
            <input type="text" id="receiverName" required />
            <label>Role</label>
            <input type="text" id="dashboardRole" required />

            <label>Receipt Number</label>
            <input type="text" id="receiptNumber" required pattern="[A-Za-z0-9\-]+" title="Alphanumeric receipt number" />

            <label>Phone Number</label>
            <input type="text" id="phoneNumber" required pattern="\d{10}" title="10 digit phone number" />

            <label>Gender</label>
            <select id="gender" required>
              <option value="">--Select--</option>
              <option>Male</option>
              <option>Female</option>
            </select>

            <label>NIN Number</label>
            <input type="text" id="ninNumber" required pattern="\d{8,10}" title="8–10 digit NIN" />

            <label>Arrival Time</label>
            <input type="datetime-local" id="arrivalTime" required />

            <button type="submit" class="btn-submit">Generate Receipt</button>
          </form>
        </div>

        <div class="receipt-section">
          <h2>Receipt</h2>
          <div id="receiptContent">
            <p>No receipt generated yet.</p>
          </div>
          <div>
            <button class="btn-submit">Print Receipt</button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script src="test.js"></script>
  </body>
</html>
