<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Park Ease Project</title>
    <link rel="stylesheet" href="style2.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato&display=swap"
    rel="stylesheet"
  />

  <body>
    <!-- <a href="register.html">Click Me</a>
    <a href="signOut.html">SIGN OUT</a>
    <a href="reports.html">REPORTS</a> -->
    <div class="container">
      <form class="form-card" id="loginForm">
        <h2>Sign In Portal</h2>

        <div class="input-group">
          <label for="email">Email address</label>
          <input type="text" id="userName" />
          <small id="emailHelp"></small>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" />
        </div>

        <button type="submit" class="btn-submit">Submit</button>

        <div class="form-footer">
          <p>Don't have an account? <a href="#">Sign Up</a></p>
        </div>
        <div class="forgot">
          <a href="#">Forgot Password?</a>
        </div>
      </form>
    </div>
    <script src="signIn.js"></script>
  </body>
</html>
